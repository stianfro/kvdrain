version: 2

before:
  hooks:
    - just generate-release-docs

builds:
  - id: kvdrain
    main: ./cmd/kvdrain
    binary: kvdrain
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    ldflags:
      - >-
        -s -w
        -X github.com/stianfro/kvdrain/internal/cli.Version={{ .Version }}
        -X github.com/stianfro/kvdrain/internal/cli.Commit={{ .Commit }}
        -X github.com/stianfro/kvdrain/internal/cli.Date={{ .CommitDate }}

archives:
  - ids:
      - kvdrain
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: .cache/release/completions/*
        dst: completions
      - src: .cache/release/manpages/*
        dst: manpages

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: archives
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.spdx.json"
    cmd: syft
    args:
      - "${artifact}"
      - --output
      - "spdx-json=${document}"

signs:
  - id: checksum
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes
    artifacts: checksum
  - id: sboms
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes
    artifacts: sbom

changelog:
  use: github
