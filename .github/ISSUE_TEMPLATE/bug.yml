name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include kubeconfig data or credentials. Use the private security process for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: kvdrain version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: cluster
    attributes:
      label: Kubernetes and KubeVirt versions
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and sanitized output
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
